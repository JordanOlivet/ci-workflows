name: Auto Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  extract-version:
    name: Extract Version
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/extract-version.yml
    with:
      source: file
      path: VERSION

  determine-bump:
    name: Determine Bump
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/determine-bump.yml
    with:
      labels: ${{ toJson(github.event.pull_request.labels.*.name) }}
      default: patch

  calculate-version:
    name: Calculate Version
    needs: [extract-version, determine-bump]
    uses: ./.github/workflows/calculate-version.yml
    with:
      current: ${{ needs.extract-version.outputs.base_version }}
      bump_type: ${{ needs.determine-bump.outputs.bump_type }}

  tag-release:
    name: Tag & Update v1
    needs: [calculate-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VERSION file
        run: echo "${{ needs.calculate-version.outputs.new_version }}" > VERSION

      - name: Commit, tag and update v1
        run: |
          TAG="${{ needs.calculate-version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION
          git commit -m "chore: bump version to $TAG [skip ci]"
          git push origin main

          git tag "$TAG"
          git push origin "$TAG"

          # Update v1 floating tag
          git push origin :refs/tags/v1 || true
          git tag -f v1
          git push origin v1
