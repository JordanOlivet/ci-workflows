name: Reusable GitHub Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version number (without v prefix)'
        required: true
        type: string
      tag:
        description: 'Git tag (with v prefix)'
        required: true
        type: string
      name:
        description: 'Release name (defaults to tag)'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false
      generate-notes:
        description: 'Auto-generate release notes'
        required: false
        type: boolean
        default: true
      artifacts-path:
        description: 'Path to artifacts directory'
        required: false
        type: string
        default: 'artifacts'
      artifacts-pattern:
        description: 'Glob pattern for artifacts'
        required: false
        type: string
        default: '**/*'

    outputs:
      release-url:
        description: 'URL of the created release'
        value: ${{ jobs.create-release.outputs.url }}
      release-id:
        description: 'ID of the created release'
        value: ${{ jobs.create-release.outputs.id }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      url: ${{ steps.release.outputs.url }}
      id: ${{ steps.release.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        if: inputs.artifacts-path != ''
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.artifacts-path }}
        continue-on-error: true

      - name: List artifacts
        if: inputs.artifacts-path != ''
        run: |
          echo "Artifacts downloaded:"
          find ${{ inputs.artifacts-path }} -type f 2>/dev/null || echo "No artifacts found"

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.name || inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate-notes }}
          files: |
            ${{ inputs.artifacts-path }}/${{ inputs.artifacts-pattern }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### GitHub Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.release.outputs.url }}" >> $GITHUB_STEP_SUMMARY
