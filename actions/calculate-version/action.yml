name: 'Calculate New Version'
description: 'Calculates new semver version based on current version and bump type'

inputs:
  current:
    description: 'Current version (e.g., 1.2.3)'
    required: true
  bump_type:
    description: 'Bump type: major, minor, or patch'
    required: true

outputs:
  new_version:
    description: 'New calculated version'
    value: ${{ steps.calculate.outputs.new_version }}
  tag:
    description: 'Git tag (v-prefixed)'
    value: ${{ steps.calculate.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - name: Calculate new version
      id: calculate
      shell: bash
      run: |
        CURRENT="${{ inputs.current }}"
        BUMP_TYPE="${{ inputs.bump_type }}"

        # Remove v prefix if present
        CURRENT=$(echo "$CURRENT" | sed 's/^v//')

        # Parse version
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        # Default to 0 if not set
        MAJOR=${MAJOR:-0}
        MINOR=${MINOR:-0}
        PATCH=${PATCH:-0}

        case "$BUMP_TYPE" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
          *)
            echo "::error::Unknown bump type: $BUMP_TYPE"
            exit 1
            ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        TAG="v${NEW_VERSION}"

        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT

        echo "Current: ${CURRENT} -> New: ${NEW_VERSION} (${BUMP_TYPE})"
